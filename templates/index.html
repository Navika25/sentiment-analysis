<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            padding-top: 100px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #ff7b00;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #ff9500;
        }

        .result {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
        }

        .positive {
            color: #00ffcc;
        }

        .negative {
            color: #ff4d4d;
        }
    </style>
</head>

<body>

    <h1>💬 Sentiment Analysis App</h1>

    <form method="POST">
        <input type="text" name="text" placeholder="Type your sentence here..." required>
        <button type="submit">Analyze</button>
    </form>

    {% if prediction %}
        <div class="result 
            {% if 'Positive' in prediction %}positive{% else %}negative{% endif %}">
            {{ prediction }}
        </div>
    {% endif %}

</body>
</html>
